{% load custom_tags %}
<div id="topbar">
  <div class="navbar">
    <div class="navbar-content">
      <div class="non-collapsable-nav">
        <ul class="nav-ui">
          {% for item in navitation %}
          <li>
            <a class="{% navactive request 'blog_filter' slug=item.slug %}" href="{% url 'blog_filter' slug=item.slug %}">{{ item.category }}</a>
          </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
