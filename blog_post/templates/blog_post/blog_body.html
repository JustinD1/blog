{% extends "base.html" %}
{% load static %}

{% block content %}
{% if posts_exists %}
  {% for post in posts %}
  <div class="">
    <a href="{% url 'post_detail' slug=post.slug %}">
      <div class="">
        <div class="">
          <h4>
            {{ post.title }}
          </h4>
        </div>
        <div class="">
          <p>
            {{ post.body }}
          </p>
        </div>
        <div class="">
          {{ post.post_published_on }}
        </div>
      </div>
    </a>
  </div>
  {% endfor %}
{% else %}
  <p>{{posts}}</p>
{% endif %}
{% endblock %}

{% block css_content_insert %}
<link rel="stylesheet" href="{% static 'css/css-posts.css' %}">
{% endblock %}
